<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="/css/private.css">
	<title>Cargar pedidos | ByGardenia</title>
</head>
<body class="bg-cargar-page">

	<header class="bg-cargar-topbar">
		<div class="bg-cargar-topbar-inner">
			<h1 class="bg-cargar-topbar-title">ByGardenia · Administración</h1>
			<a href="/venta/listaClientes" class="bg-cargar-back">Volver a clientes</a>
		</div>
	</header>

	<main class="bg-cargar-main">
		<section class="bg-cargar-card">
			<div class="bg-cargar-head">
				<p class="bg-cargar-eyebrow">Panel interno</p>
				<h2 class="bg-cargar-title">Cargar pedido</h2>
				<p class="bg-cargar-text">
					Agrega uno o más productos para generar el pedido del cliente seleccionado.
				</p>
			</div>

			<form id="formulario" class="bg-cargar-form">
				<div class="bg-cargar-info-box">
					<h3 id="info-cliente" class="bg-cargar-info-cliente"></h3>
					<span id="message" class="bg-cargar-message"></span>
				</div>

				<div id="virtual" class="bg-cargar-virtual">
					<!-- JS -->
				</div>

				<div class="bg-cargar-actions">
					<button type="button" id="agregar" class="bg-cargar-btn bg-cargar-btn-secondary">
						+ Agregar pedido
					</button>
					<button type="submit" class="bg-cargar-btn bg-cargar-btn-primary">
						Enviar pedido
					</button>
				</div>
			</form>

			<p id="mensaje" class="bg-cargar-extra-message"></p>
		</section>
	</main>

	<script src="./cargar.js"></script>
</body>
</html>
