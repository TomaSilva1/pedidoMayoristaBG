<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Registro mayorista | ByGardenia</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="/cliente/client.css" />
</head>
<body>

  <div class="topbar">
    Venta mayorista ByGardenia · Formulario
  </div>

  <main class="registro-page">
    <div class="container py-4 py-md-5">
      <div class="row justify-content-center align-items-stretch g-0 registro-wrap">

        <div class="col-lg-6">
          <section class="form-panel">
            <div class="brand-box">
              <p class="eyebrow">BYGARDENIA SPORT</p>
              <h1>Registrate como nuevo cliente</h1>
              <p class="subtext">
                Completa los datos para generar tu alta como cliente y continuar con la compra mayorista.
              </p>
            </div>

            <form id="form-cliente" class="row g-3">
              <div class="col-md-6">
                <label for="nom" class="form-label">Nombre</label>
                <input type="text" id="nom" class="form-control custom-input" required>
              </div>

              <div class="col-md-6">
                <label for="ape" class="form-label">Apellido</label>
                <input type="text" id="ape" class="form-control custom-input" required>
              </div>

              <div class="col-md-6">
                <label for="tele" class="form-label">Teléfono</label>
                <input type="text" id="tele" class="form-control custom-input" required>
              </div>

              <div class="col-md-6">
                <label for="DNI" class="form-label">DNI</label>
                <input type="text" id="DNI" class="form-control custom-input" required>
              </div>

              <div class="col-md-6">
                <label for="provincia" class="form-label">Provincia</label>
                <input type="text" id="provincia" class="form-control custom-input">
              </div>

              <div class="col-md-6">
                <label for="localidad" class="form-label">Localidad</label>
                <input type="text" id="localidad" class="form-control custom-input">
              </div>

              <div class="col-md-6">
                <label for="cp" class="form-label">Código postal</label>
                <input type="number" id="cp" class="form-control custom-input">
              </div>

              <div class="col-md-6">
                <label for="metodo-e" class="form-label">Método de envío</label>
                <select name="metodo" id="metodo-e" class="form-select custom-input" required>
                  <option value="" selected disabled>Seleccione una opción</option>
                  <option value="1">Vía Cargo</option>
                  <option value="2">Correo Argentino</option>
                </select>
              </div>

              <div class="col-12">
                <label for="dire" class="form-label">Dirección</label>
                <input type="text" id="dire" class="form-control custom-input">
              </div>

              <div class="col-12">
                <button type="submit" class="btn btn-dark submit-btn">
                    ENVIAR
                </button>
              </div>

              <div class="col-12">
                <span id="text" class="form-message"></span>
              </div>
            </form>
          </section>
        </div>

        <div class="col-lg-5 d-none d-lg-block">
          <aside class="image-panel">
            <div class="image-overlay">
                <p class="image-kicker">Mayorista</p>
                <h2>Siempre en compromiso con nuestros clientes</h2>
            </div>
          </aside>
        </div>

      </div>
    </div>
  </main>

  <script src="/cliente/cliente.js"></script>
</body>
</html>
