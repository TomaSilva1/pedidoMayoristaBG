<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />

	<title>Acceso administrativo | ByGardenia</title>

	<link
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
		rel="stylesheet"
	/>

	<link rel="stylesheet" href="/login/login.css" />
</head>
<body>

	<div class="topbar">
		ByGardenia · Administración
	</div>

	<main class="login-page">
		<div class="container">
			<div class="row justify-content-center align-items-center min-vh-100">
				<div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-5">

					<section class="login-card">
						<div class="login-brand">
							<p class="eyebrow">Panel interno</p>
							<h1>Acceso administrativo</h1>
							<p class="subtext">
								Ingresá con tu usuario y contraseña para acceder al sistema.
							</p>
						</div>

						<form id="form-login" class="login-form">
							<div class="mb-3">
								<label for="user" class="form-label">Usuario</label>
								<input type="text" id="user" class="form-control custom-input" required>
							</div>

							<div class="mb-3">
								<label for="pass" class="form-label">Contraseña</label>
								<input type="password" id="pass" class="form-control custom-input" required>
							</div>

							<div class="d-grid mt-4">
								<button type="submit" class="btn submit-btn">
									Ingresar
								</button>
							</div>

							<div class="mt-3">
								<span id="message" class="login-message"></span>
							</div>
						</form>
					</section>

				</div>
			</div>
		</div>
	</main>

	<script src="/login/login.js"></script>
</body>
</html>
